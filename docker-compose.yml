services:
  postgres:
    image: postgres:15-alpine
    container_name: royalty-radar-db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: royalty-radar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: royalty-radar-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
